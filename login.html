<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script defer src="js/auth.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-red-900 to-gray-800 flex items-center justify-center h-screen text-white">

  <div class="bg-gray-900/70 backdrop-blur-lg p-8 rounded-2xl shadow-lg w-96 max-w-full mx-auto">

    <h2 class="text-3xl font-bold mb-6 text-center">Welcome Back</h2>

    <input id="email" placeholder="Email"
      class="w-full mb-3 p-3 rounded bg-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 rounded bg-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">

    <button onclick="login()"
      class="w-full bg-red-600 hover:bg-red-700 p-3 rounded font-semibold transition">
      Login
    </button>

    <p class="text-sm text-gray-400 mt-4 text-center">
      Don't have an account?
      <a href="register.html" class="text-red-400 hover:underline">Register</a>
    </p>

  </div>

</body>
</html>
